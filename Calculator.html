<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>
<style>
  body {
    background: linear-gradient(to right, rgb(28, 56, 28), rgba(2, 124, 133, 0.781));
    height: 100%;
    width: 100%;
    display: flex;
    justify-content: center;
    overflow: hidden;
  }

  .calculator {
    margin-top: 100px;
    background-color: #524242;
    width: 300px;
    height: 450px;
    text-align: center;
    border-radius: 10px;
    border-top-right-radius: 70px;
    border-bottom-left-radius: 70px;
    box-shadow: 0px 0px 20px 10px;
  }

  input {
    width: 230px;
    height: 100px;
    border-radius: 20px;
  }

  button {
    height: 50px;
    width: 50px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background-color: #c07272;
    color: #fff;
    font-weight: 600;
    font-size: 18px;
  }

  button:hover {
    background-color: rgb(147, 153, 153);
    color: #fff;
    transform: scale(1.2);
  }

  h1 {
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 600;
  }
  h1:hover{
    font-family: Arial, Helvetica, sans-serif;
    color: #dbb6b6;
    transform: scale(1.3);
  }
</style>

<body>
  <div class="calculator">
    <h1>Calculator</h1>
    <input id="text" type=" text" disabled>
    <div class="btn">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>X</button>
    </div>
    <div>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>-</button>
    </div>
    <div>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>+</button>
    </div>
    <div>
      <button>0</button>
      <button>00</button>
      <button>.</button>
      <button style="background-color: rgba(0, 0, 255, 0.486); color: #fff;">=</button>
    </div>

  </div>

<script src="cal.js"></script>
</body>

</html>
